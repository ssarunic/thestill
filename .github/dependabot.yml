version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - python
    groups:
      python-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /thestill/web/frontend
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - javascript
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Etc/UTC
    labels:
      - dependencies
      - docker
    ignore:
      # Blocked on pydub / audioop. pydub 0.25.1 still imports audioop,
      # which was removed from CPython stdlib in 3.13. Unblock by adding
      # `audioop-lts; python_version>=3.13` to pyproject.toml first.
      - dependency-name: "python"
        update-types: ["version-update:semver-major"]
