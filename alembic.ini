# Alembic configuration (spec #44 Phase 5 — Postgres schema migrations).
#
# The database URL is taken from the DATABASE_URL environment variable
# (see thestill/migrations/env.py); the value here is only a fallback for
# explicit -x url= usage and is intentionally blank.

[alembic]
script_location = thestill/migrations
prepend_sys_path = .
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
